<div class="min-h-screen bg-gray-950">
  <app-header />

  <div class="p-8">
    <div class="flex gap-4 mb-6">
      <ui-select
        label="Resource"
        placeholder="Select a resource"
        [options]="resourceOptions"
        (selectionChange)="onResourceChange($event.value)"
      />
      <ui-select
        label="Status Filter"
        placeholder="Select a status"
        [options]="statusOptions"
        [loading]="resourceService.loading()"
        [disabled]="resourceService.resource() !== 'character'"
        (selectionChange)="onStatusChange($event.value)"
      />
    </div>

    <ui-table
      [columns]="columns"
      [rows]="rows"
      [loading]="resourceService.loading()"
      [errorMessage]="resourceService.error()"
      emptyMessage="No results found in this dimension"
      (actionTriggered)="onViewAction($event.row)"
    />
  </div>

  <app-detail-modal
    [row]="selectedRow"
    [resourceType]="resourceService.resource()"
    (closed)="onCloseModal()"
  />
</div>
