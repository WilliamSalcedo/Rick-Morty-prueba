<div class="flex flex-col gap-1 w-full">
  @if (label()) {
    <label for="ui-select" class="text-xs font-mono text-gray-500 uppercase tracking-widest">
      {{ label() }}
    </label>
  }

  <div class="relative w-full">
    @if (loading()) {
      <div class="w-full h-[42px] bg-gray-700/50 rounded-lg animate-pulse"></div>
    } @else {
      <select
        id="ui-select"
        class="w-full bg-[#0f1420] border border-gray-700/50 text-gray-200 text-sm rounded-lg px-3 py-2.5 pr-8 appearance-none cursor-pointer hover:border-green-400/50 focus:border-green-400 focus:outline-none focus:ring-1 focus:ring-green-400/20 transition-all disabled:opacity-40 disabled:cursor-not-allowed font-mono"
        [disabled]="disabled()"
        (change)="onChange($event)"
      >
        <option value="" disabled [selected]="!value()">
          {{ placeholder() }}
        </option>
        @for (option of options(); track option.value) {
          <option [value]="option.value" [selected]="value() === option.value">
            {{ option.label }}
          </option>
        }
      </select>
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-green-400 pointer-events-none text-xs">▼</span>
    }
  </div>
</div>
