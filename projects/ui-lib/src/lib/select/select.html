<div class="flex flex-col gap-1">
  @if (label()) {
    <label for="ui-select" class="text-xs font-medium text-gray-400 uppercase tracking-wider">
      {{ label() }}
    </label>
  }

  <div class="relative">
    @if (loading()) {
      <div class="w-full h-[42px] bg-gray-700 rounded-lg animate-pulse"></div>
    } @else {
      <select
        id="ui-select"
        class="w-full bg-gray-900 border border-gray-700 text-gray-300 text-sm rounded-lg px-3 py-2 pr-8 appearance-none cursor-pointer hover:border-green-400 focus:border-green-400 focus:outline-none transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="disabled()"
        (change)="onChange($event)"
      >
        <option value="" disabled [selected]="!value()">
          {{ placeholder() }}
        </option>
        @for (option of options(); track option.value) {
          <option [value]="option.value" [selected]="value() === option.value">
            {{ option.label }}
          </option>
        }
      </select>
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-green-400 pointer-events-none text-xs">▼</span>
    }
  </div>
</div>
